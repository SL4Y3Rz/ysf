name: Build iOS Dylib

on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile Dylib
        run: |
          clang++ -arch arm64 \
            -std=c++17 \
            -dynamiclib \
            -O2 \
            -fPIC \
            -framework Foundation \
            -miphoneos-version-min=14.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -o memory_debugger_sideload.dylib \
            memory_debugger_sideload.cpp

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory_debugger_sideload
          path: memory_debugger_sideload.dylib

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: memory_debugger_sideload.dylib
          tag_name: build-${{ github.run_number }}
          body: |
            iOS Dylib build #${{ github.run_number }}
            
            Built on: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.event.head_commit.id }}
          draft: false
          prerelease: false
